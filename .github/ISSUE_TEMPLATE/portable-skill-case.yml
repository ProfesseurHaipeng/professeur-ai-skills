name: Portable Skill case
description: Submit the smallest synthetic Skill that reproduces a missed or incorrect finding.
title: "[case] "
labels:
  - portability-case
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reducing the problem to a synthetic Skill. Do not attach private repositories, credentials, identifying data, or operational records.
  - type: checkboxes
    id: scope
    attributes:
      label: Public-scope confirmation
      options:
        - label: The example is synthetic or explicitly licensed for public sharing.
          required: true
        - label: The example contains no credentials, identifying data, or private project material.
          required: true
        - label: I did not execute the target Skill to produce this report.
          required: true
  - type: dropdown
    id: host
    attributes:
      label: Target host
      options:
        - Codex
        - GitHub Copilot
        - Both
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Doctor version or commit
      placeholder: v0.1.0 or a full commit SHA
    validations:
      required: true
  - type: textarea
    id: tree
    attributes:
      label: Minimal synthetic Skill tree
      description: Show only the files required to reproduce the case.
      render: text
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact audit command and sanitized output
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and observed result
      description: State the finding ID and evidence line when available.
    validations:
      required: true
  - type: textarea
    id: limitation
    attributes:
      label: Known limitation or false-positive risk
      description: Explain what a narrow fix must avoid breaking.
