name: Release audit

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Run release tests and scope gate
        run: |
          python3 -m unittest discover -s tests -v
          python3 scripts/check_public_scope.py .
      - name: Validate Agent Skill contract
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh skill publish --dry-run .
      - name: Build deterministic source archive
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/professeur-ai-skills-${GITHUB_REF_NAME}.zip"
          git archive --format=zip --prefix="professeur-ai-skills-${GITHUB_REF_NAME}/" --output="$archive" HEAD
          printf '%s\n' "$archive" > "$RUNNER_TEMP/release-archive-path"
      - name: Audit source archive
        shell: bash
        run: |
          set -euo pipefail
          archive="$(head -n 1 "$RUNNER_TEMP/release-archive-path")"
          python3 scripts/audit_release_archive.py "$archive"
          sha256sum "$archive"
