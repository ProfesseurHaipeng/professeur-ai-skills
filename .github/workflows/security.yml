name: Security gates

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  current-and-history:
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Audit current public tree
        run: python3 scripts/check_public_scope.py .
      - name: Audit every reachable source snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/history-audit"
          git rev-list --all | while IFS= read -r commit; do
            archive="$RUNNER_TEMP/history-audit/$commit.zip"
            git archive --format=zip --output="$archive" "$commit"
            python3 scripts/audit_release_archive.py "$archive"
          done
