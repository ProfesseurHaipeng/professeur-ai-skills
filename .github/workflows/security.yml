name: Security gates

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  current-and-history:
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Audit current public tree
        run: python3 scripts/check_public_scope.py .
      - name: Audit every reachable source snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/history-audit"
          git rev-list --all | while IFS= read -r commit; do
            archive="$RUNNER_TEMP/history-audit/$commit.zip"
            git archive --format=zip --output="$archive" "$commit"
            python3 scripts/audit_release_archive.py "$archive"
          done
